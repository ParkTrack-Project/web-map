<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Data erasure request — ParkTrack</title>
    <link rel="icon" type="image/svg+xml" href="/parktrack-icon.jpg"/>
    <meta name="description" content="ParkTrack Data erasure request"/>
    <meta name="theme-color" content="#16a34a"/>
    <style>
        :root {
            --bg: #f6faf7;
            --bg-soft: #edf7f0;
            --surface: #ffffff;
            --surface-muted: #f8fbf9;
            --text: #102016;
            --muted: #60706a;
            --line: rgba(16, 32, 22, 0.12);
            --green: #16a34a;
            --green-dark: #0f7a38;
            --green-soft: #dcfce7;
            --shadow: 0 24px 70px rgba(15, 122, 56, 0.13);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --max: 1160px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(34, 197, 94, 0.20), transparent 34rem),
            radial-gradient(circle at 85% 8%, rgba(20, 184, 166, 0.14), transparent 30rem),
            linear-gradient(180deg, #f8fcf9 0%, var(--bg) 45%, #ffffff 100%);
            line-height: 1.65;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            width: min(100% - 32px, var(--max));
            margin: 0 auto;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(18px);
            background: rgba(246, 250, 247, 0.82);
            border-bottom: 1px solid var(--line);
        }

        .topbar-inner {
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            letter-spacing: -0.03em;
            font-size: 1.15rem;
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: contain;
            display: block;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .button,
        .lang-button {
            border: 1px solid var(--line);
            border-radius: 999px;
            min-height: 42px;
            padding: 0 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.86);
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .button:hover,
        .lang-button:hover {
            transform: translateY(-1px);
            border-color: rgba(22, 163, 74, 0.35);
            box-shadow: 0 12px 26px rgba(15, 122, 56, 0.11);
        }

        .button-primary {
            border-color: transparent;
            background: var(--green);
            color: #fff;
            box-shadow: 0 12px 28px rgba(22, 163, 74, 0.24);
        }

        .language-switcher {
            display: inline-flex;
            padding: 4px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
        }

        .lang-button {
            min-height: 34px;
            padding: 0 12px;
            border: 0;
            background: transparent;
            color: var(--muted);
            box-shadow: none;
        }

        .lang-button.is-active {
            background: var(--green);
            color: #fff;
        }

        .hero {
            padding: 64px 0 30px;
        }

        .hero-card {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-xl);
            padding: clamp(28px, 5vw, 54px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(237, 247, 240, 0.92)),
            radial-gradient(circle at 90% 10%, rgba(22, 163, 74, 0.25), transparent 18rem);
            border: 1px solid rgba(22, 163, 74, 0.14);
            box-shadow: var(--shadow);
        }

        .hero-card::after {
            content: "";
            position: absolute;
            inset: auto -60px -120px auto;
            width: 340px;
            height: 340px;
            border-radius: 999px;
            background: rgba(22, 163, 74, 0.10);
            pointer-events: none;
        }

        .breadcrumb {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            color: var(--green-dark);
            background: var(--green-soft);
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .hero h1 {
            max-width: 820px;
            margin: 0 0 16px;
            font-size: clamp(2.15rem, 5vw, 4.6rem);
            line-height: 1.02;
            letter-spacing: -0.02em;
        }

        .hero p {
            max-width: 780px;
            margin: 0;
            color: var(--muted);
            font-size: clamp(1.02rem, 2vw, 1.22rem);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-top: 28px;
            position: relative;
            z-index: 1;
        }

        .meta-card {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.74);
            padding: 18px;
        }

        .meta-label {
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .meta-value {
            margin-top: 5px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 24px;
            padding: 26px 0 72px;
            align-items: start;
        }

        .toc {
            position: sticky;
            top: 96px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 18px 50px rgba(16, 32, 22, 0.06);
            padding: 18px;
        }

        .toc-title {
            margin: 0 0 10px;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .toc nav {
            display: grid;
            gap: 4px;
        }

        .toc a {
            display: block;
            border-radius: 12px;
            padding: 9px 10px;
            color: #334139;
            font-weight: 650;
            font-size: 0.94rem;
        }

        .toc a:hover {
            background: var(--bg-soft);
            color: var(--green-dark);
        }

        .content-card {
            border-radius: var(--radius-xl);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 22px 70px rgba(16, 32, 22, 0.07);
            padding: clamp(24px, 4vw, 44px);
        }

        .policy-section {
            scroll-margin-top: 104px;
            padding: 26px 0;
            border-bottom: 1px solid var(--line);
        }

        .policy-section:first-child {
            padding-top: 0;
        }

        .policy-section:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        h2 {
            margin: 0 0 14px;
            font-size: clamp(1.35rem, 2.2vw, 1.9rem);
            line-height: 1.18;
            letter-spacing: -0.035em;
        }

        h3 {
            margin: 20px 0 8px;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        p {
            margin: 0 0 14px;
        }

        ul {
            margin: 10px 0 0;
            padding-left: 1.2rem;
        }

        li + li {
            margin-top: 6px;
        }

        .note {
            padding: 16px 18px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(22, 163, 74, 0.22);
            background: rgba(220, 252, 231, 0.55);
            color: #194629;
            font-weight: 650;
        }

        .contact-list {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .contact-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: baseline;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: var(--surface-muted);
        }

        .contact-row strong {
            min-width: 220px;
        }

        .contact-row a {
            color: var(--green-dark);
            font-weight: 800;
        }

        .footer {
            border-top: 1px solid var(--line);
            padding: 26px 0 40px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        [hidden] {
            display: none !important;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .toc {
                position: static;
            }

            .meta-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .page-shell {
                width: min(100% - 22px, var(--max));
            }

            .topbar-inner {
                padding: 10px 0;
                align-items: flex-start;
                flex-direction: column;
            }

            .top-actions {
                width: 100%;
                justify-content: space-between;
            }

            .button-primary {
                flex: 1 1 auto;
            }

            .hero {
                padding-top: 34px;
            }

            .hero-card,
            .content-card {
                border-radius: 22px;
            }
        }

        @media print {
            .topbar,
            .toc,
            .button,
            .language-switcher {
                display: none !important;
            }

            body {
                background: #fff;
            }

            .hero,
            .layout {
                padding: 0;
            }

            .hero-card,
            .content-card {
                box-shadow: none;
                border: 0;
                padding: 0;
            }

            .layout {
                display: block;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="page-shell topbar-inner">
        <a class="brand" href="/public" aria-label="ParkTrack home">
            <img class="brand-mark" src="../parktrack-icon.jpg" alt="ParkTrack logo">
            <span>ParkTrack</span>
        </a>

        <div class="top-actions">
            <div class="language-switcher" role="group" aria-label="Language switcher">
                <button class="lang-button is-active" type="button" data-set-lang="ru" aria-pressed="true">RU</button>
                <button class="lang-button" type="button" data-set-lang="en" aria-pressed="false">EN</button>
            </div>
            <a class="button button-primary" href="/" data-i18n="homeButton">← На главную</a>
        </div>
    </div>
</header>

<main>
    <section class="hero page-shell">
        <div class="hero-card">
            <div class="breadcrumb" data-i18n="breadcrumb">Справка · Данные</div>
            <h1 data-i18n="heroTitle">Удаление данных</h1>
            <p data-i18n="heroText">Как удалить свою информацию с серверов ParkTrack.</p>

            <div class="meta-grid" aria-label="Policy summary">
                <div class="meta-card">
                    <div class="meta-label" data-i18n="contactLabel">Контакт</div>
                    <div class="meta-value"><a href="mailto:data-erasure@parktrack.live">data-erasure@parktrack.live</a></div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="page-shell">© 2026 ParkTrack Project</div>
</footer>

<script>
    const dictionary = {
        ru: {
            homeButton: '← На главную',
            breadcrumb: 'Справка · Данные',
            heroTitle: 'Удаление данных',
            heroText: 'В соответствии с Федеральным законом № 152-ФЗ «О персональных данных» мы обязуемся удалить Ваши персональные данные с наших серверов вплоть до удаления аккаунта в установленные законом сроки. Чтобы отправить нам такой запрос, воспользуйтесь контактным адресом электронной почты указанным ниже.',
            updatedLabel: 'Обновлено',
            operatorLabel: 'Оператор',
            contactLabel: 'Контакт',
            tocTitle: 'Разделы',
            footerText: ''
        },
        en: {
            homeButton: '← Back home',
            breadcrumb: 'Help · Data',
            heroTitle: 'Data erasure',
            heroText: 'In accordance with GDPR and other applicable laws, we undertake to delete your personal data from our servers (which may even include the deletion of your account) within the timeframes established by law. To submit such a request, please use the contact email address below.',
            updatedLabel: 'Updated',
            operatorLabel: 'Operator',
            contactLabel: 'Contact',
            tocTitle: 'Sections',
            footerText: ''
        }
    };

    function setLanguage(lang) {
        const safeLang = lang === 'en' ? 'en' : 'ru';
        document.documentElement.lang = safeLang;
        document.title = safeLang === 'ru' ? 'Удаление данных — ParkTrack' : 'Data erasure — ParkTrack';

        document.querySelectorAll('[data-lang-section]').forEach((section) => {
            section.hidden = section.dataset.langSection !== safeLang;
        });

        document.querySelectorAll('[data-toc]').forEach((toc) => {
            toc.hidden = toc.dataset.toc !== safeLang;
        });

        document.querySelectorAll('[data-i18n]').forEach((node) => {
            const key = node.dataset.i18n;
            node.textContent = dictionary[safeLang][key];
        });

        document.querySelectorAll('[data-set-lang]').forEach((button) => {
            const isActive = button.dataset.setLang === safeLang;
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', String(isActive));
        });

        const url = new URL(window.location.href);
        url.searchParams.set('lang', safeLang);
        window.history.replaceState({}, '', url);
    }

    document.querySelectorAll('[data-set-lang]').forEach((button) => {
        button.addEventListener('click', () => setLanguage(button.dataset.setLang));
    });

    const initial = new URLSearchParams(window.location.search).get('lang') || 'ru';
    setLanguage(initial === 'en' ? 'en' : 'ru');
</script>
</body>
</html>
