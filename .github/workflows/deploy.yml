name: Deploy Vite site to Nginx

on:
  push:
    branches: [main, deploy-test]

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          VITE_YMAP_KEY: ${{ secrets.VITE_YMAP_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE }}
          VITE_API_MODE: ${{ vars.VITE_API_MODE }}
          VITE_SHARED_SHELL_URL: ${{ vars.VITE_SHARED_SHELL_URL }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Upload dist/ to server
        run: |
          rsync -az --delete \
            -e "ssh" \
            dist/ \
            "${{ secrets.USERNAME }}@${{ secrets.SERVER_IP }}:${{ secrets.DIST_PATH }}/"
