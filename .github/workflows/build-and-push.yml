name: Build and push Docker image

on:
  push:
    branches: ['main', 'development']
  pull_request:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IS_DEFAULT: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generic path for future non-GHCR registries
      - name: Log in to external registry
        if: env.REGISTRY != 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=development,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            VITE_API_BASE_URL=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) && vars.VITE_DEV_API_BASE_URL || vars.VITE_API_BASE_URL }}
            VITE_YMAP_KEY=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) && secrets.VITE_DEV_YMAP_KEY || secrets.VITE_YMAP_KEY }}
            VITE_AUTH_MODE=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) && vars.VITE_DEV_AUTH_MODE || vars.VITE_AUTH_MODE }}
            VITE_SHARED_SHELL_URL=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) && vars.VITE_DEV_SHARED_SHELL_URL || vars.VITE_SHARED_SHELL_URL }}
            VITE_API_MODE=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) && vars.VITE_DEV_API_MODE || vars.VITE_API_MODE }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs:
      - build-and-push

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "${{ env.IS_DEFAULT }}" = "true" ]; then
              cd ${{ secrets.COMPOSE_DIRECTORY_PATH }}
              docker compose up -d
            else
              cd ${{ secrets.DEVELOPMENT_COMPOSE_DIRECTORY_PATH }}
              docker compose -p parktrack-dev up -d
            fi
