server {
    listen 80;
    root /usr/share/nginx/html;

    # Security-заголовки (CSP и пр.) — единый источник, см. файл-комментарий.
    include /etc/nginx/security-headers.conf;

    # SPA-документ и MSW service-worker НЕ кэшируем (no-store). История белого
    # экрана: браузер держал старый index.html с устаревшим CSP-заголовком и
    # старый SW → новый CSP/SW не подхватывались после деплоя. /assets/* —
    # контент-хэшированные, иммутабельны, кэшируются нормально (отдельного
    # правила не нужно). add_header здесь отменяет наследование server-level
    # add_header → security-headers.conf повторно include-им в каждый блок.
    location = /index.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /mockServiceWorker.js {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location / {
        index index.html index.htm;
        # try_files откатывается на /index.html → внутренний редирект попадает
        # в location = /index.html (no-store + headers) для всех deep-link'ов.
        try_files $uri $uri/ /index.html;
    }

    # Phase 4 / Task 0 CORS passthrough (D-01 research override): same proxy paths
    # as web-map/vite.config.ts so prod uses identical URLs (`/yandex-suggest/...`
    # / `/yandex-geocode/...`).
    location /yandex-suggest/ {
        proxy_pass https://suggest-maps.yandex.ru/;
        proxy_set_header Host suggest-maps.yandex.ru;
    }

    location /yandex-geocode/ {
        proxy_pass https://geocode-maps.yandex.ru/;
        proxy_set_header Host geocode-maps.yandex.ru;
    }
}
