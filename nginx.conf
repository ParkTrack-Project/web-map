server {
    listen 80;

    # Phase 5 D-33 NFR-06 CSP header — Yandex Maps v3 + Suggest + Geocoder + Routing
    # Source: yandex.ru/maps-api/docs/js-api/common/connection/csp.html
    # 'unsafe-eval' required by Yandex vector tile engine (документировано)
    # 'unsafe-inline' style-src — Yandex Maps inject inline styles dynamically; without — UI broken
    #
    # Fix 2026-05-16: connect-src был захардкожен только на https://api.parktrack.live
    # (prod). Этот nginx.conf — единственный источник CSP для ВСЕХ окружений,
    # собираемых из Dockerfile (build-args dev-деплоя лежат во внешнем CI, не в
    # репо). Real-API dev-сборка (VITE_API_BASE_URL=https://api.dev.parktrack.live)
    # упиралась в CSP собственного nginx. https://*.parktrack.live покрывает
    # api.parktrack.live И api.dev.parktrack.live (CSP host-wildcard матчит
    # многоуровневые поддомены), prod при этом не затронут.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://yastatic.net https://suggest-maps.yandex.ru; connect-src 'self' https://*.parktrack.live https://api.parktrack.live https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://*.maps.yandex.net https://suggest-maps.yandex.ru https://search-maps.yandex.ru https://geocode-maps.yandex.ru https://api.routing.yandex.net; style-src 'self' 'unsafe-inline' https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://yastatic.net; img-src 'self' data: blob: https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://*.maps.yandex.net https://yastatic.net; worker-src 'self' data: blob: https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://yastatic.net; frame-ancestors 'self' https://parktrack.live https://*.parktrack.live;" always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Phase 4 / Task 0 CORS passthrough (D-01 research override): same proxy paths
    # as web-map/vite.config.ts so prod uses identical URLs (`/yandex-suggest/...`
    # / `/yandex-geocode/...`).
    location /yandex-suggest/ {
        proxy_pass https://suggest-maps.yandex.ru/;
        proxy_set_header Host suggest-maps.yandex.ru;
    }

    location /yandex-geocode/ {
        proxy_pass https://geocode-maps.yandex.ru/;
        proxy_set_header Host geocode-maps.yandex.ru;
    }
}
