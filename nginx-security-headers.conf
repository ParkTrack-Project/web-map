# Единый источник security-заголовков (CSP + прочее).
#
# ВАЖНО: в nginx `add_header` в location ОТМЕНЯЕТ наследование server-level
# `add_header`. Поэтому там, где у location есть свой add_header (Cache-Control
# для no-store), эти заголовки нужно повторить — этот файл include-ится в
# каждый такой блок, чтобы CSP не дублировался руками и не «разъезжался»
# (история с пропавшим yastatic.net/parktrack.live именно про дрейф CSP).
#
# Файл лежит вне /etc/nginx/conf.d/ (туда nginx авто-include'ит *.conf как
# server-конфиги — bare add_header вне server{} уронил бы старт).
#
# CSP — Yandex Maps v3 (csp=202512) + Suggest/Geocoder/Routing:
#   - 'unsafe-eval'  — vector-движок Yandex (fetch+eval, документировано)
#   - 'unsafe-inline' style-src — Yandex инжектит inline-стили
#   - yastatic.net в connect-src — в csp-режиме движок (main.csp-*.js/.css)
#     грузится fetch()'ем; MSW service-worker (mock) переотправляет его как
#     fetch → правило connect-src, не script-src. Без этого — белый экран.
#   - *.parktrack.live — prod (api.parktrack.live) + dev (api.dev.parktrack.live)
#   - http://localhost:8000 / http://127.0.0.1:8000 — локальный api-server (dev/demo
#     compose-сборка с VITE_API_BASE_URL=http://localhost:8000); 'self' покрывает
#     только same-origin (порт 80/13000), на :8000 нужен явный allow.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://yastatic.net https://suggest-maps.yandex.ru; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 https://*.parktrack.live https://api.parktrack.live https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://*.maps.yandex.net https://yastatic.net https://suggest-maps.yandex.ru https://search-maps.yandex.ru https://geocode-maps.yandex.ru https://api.routing.yandex.net; style-src 'self' 'unsafe-inline' https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://yastatic.net; img-src 'self' data: blob: https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://*.maps.yandex.net https://yastatic.net; worker-src 'self' data: blob: https://api-maps.yandex.ru https://*.api-maps.yandex.ru https://yastatic.net; frame-ancestors 'self' https://parktrack.live https://*.parktrack.live;" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
